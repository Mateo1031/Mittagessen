{% extends 'lunch_app/base.html' %}

{% block content %}
<div class="auth-wrapper">
    <div class="auth-card">
        <div style="text-align: center; margin-bottom: 20px; font-size: 3rem;">🔑</div>
        <h2 class="auth-title">Passwort vergessen?</h2>
        <p class="auth-text">Gib deine E-Mail-Adresse ein. Wir senden dir einen Link, um dein Passwort zurückzusetzen.</p>

        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <label for="id_email">E-Mail Adresse</label>
                <input type="email" name="email" id="id_email" class="modern-input" required placeholder="max@beispiel.ch">
            </div>
            
            <button type="submit" class="btn-submit">Link anfordern</button>
        </form>
    </div>
</div>

<style>
    .auth-wrapper { display: flex; justify-content: center; padding-top: 40px; padding-bottom: 40px; }
    .auth-card { background: white; width: 100%; max-width: 450px; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px -5px rgba(0,0,0,0.05); border: 1px solid rgba(255,255,255,0.8); animation: slideUp 0.5s ease-out; }
    .auth-title { text-align: center; color: #1e293b; margin: 0 0 10px 0; font-size: 1.8rem; font-weight: 700; }
    .auth-text { text-align: center; color: #64748b; margin-bottom: 30px; font-size: 0.95rem; line-height: 1.5; }
    .form-group { margin-bottom: 20px; }
    .form-group label { display: block; margin-bottom: 8px; color: #64748b; font-weight: 500; font-size: 0.9rem; }
    .modern-input { width: 100%; padding: 12px 15px; border: 2px solid #e2e8f0; border-radius: 10px; font-size: 1rem; box-sizing: border-box; transition: border-color 0.2s; color: #334155; font-family: inherit; }
    .modern-input:focus { border-color: #3b82f6; outline: none; }
    .btn-submit { background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%); color: white; border: none; padding: 14px; border-radius: 10px; font-weight: 600; font-size: 1rem; cursor: pointer; width: 100%; transition: transform 0.2s; box-shadow: 0 4px 10px rgba(37, 99, 235, 0.3); }
    .btn-submit:hover { transform: translateY(-2px); }
    @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
</style>
{% endblock %}
