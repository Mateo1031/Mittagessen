{% extends 'lunch_app/base.html' %}

{% block content %}
<div class="auth-wrapper">
    <div class="auth-card" style="text-align: center;">
        <div style="font-size: 4rem; margin-bottom: 20px;">🎉</div>
        <h2 class="auth-title">Geschafft!</h2>
        <p class="auth-text">
            Dein Passwort wurde erfolgreich geändert.<br>
            Du kannst dich jetzt anmelden.
        </p>
        
        <a href="{% url 'login' %}" class="btn-submit" style="text-decoration: none; display: inline-block;">
            Zum Login
        </a>
    </div>
</div>

<style>
    /* Styles wiederverwenden */
    .auth-wrapper { display: flex; justify-content: center; padding-top: 40px; }
    .auth-card { background: white; width: 100%; max-width: 450px; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px -5px rgba(0,0,0,0.05); border: 1px solid rgba(255,255,255,0.8); animation: slideUp 0.5s ease-out; }
    .auth-title { color: #1e293b; margin: 0 0 10px 0; font-size: 1.8rem; font-weight: 700; }
    .auth-text { color: #64748b; margin-bottom: 30px; font-size: 0.95rem; line-height: 1.5; }
    .btn-submit { background: linear-gradient(135deg, #10b981 0%, #059669 100%); color: white; border: none; padding: 14px 40px; border-radius: 10px; font-weight: 600; font-size: 1rem; cursor: pointer; transition: transform 0.2s; box-shadow: 0 4px 10px rgba(16, 185, 129, 0.3); }
    .btn-submit:hover { transform: translateY(-2px); }
    @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
</style>
{% endblock %}
