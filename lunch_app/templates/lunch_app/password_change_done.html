{% extends 'lunch_app/base.html' %}

{% block content %}

<div class="profile-wrapper">
    <div class="profile-card" style="margin-top: 60px; text-align: center;">
        <div style="font-size: 4rem; margin-bottom: 20px;">✅</div>
        
        <h3 class="card-title">Passwort geändert!</h3>
        
        <p style="color: #64748b; margin-bottom: 40px; line-height: 1.6;">
            Dein Passwort wurde erfolgreich aktualisiert.<br>
            Du kannst dich ab jetzt mit dem neuen Passwort anmelden.
        </p>

        <a href="{% url 'profile' %}" class="btn-save" style="text-decoration: none; display: inline-block;">
            Zurück zum Profil
        </a>
    </div>
</div>

<style>
    .profile-wrapper { max-width: 500px; margin: 0 auto; padding-top: 20px; }
    .profile-card { background: white; border-radius: 20px; padding: 50px 40px; box-shadow: 0 10px 30px -5px rgba(0, 0, 0, 0.05); border: 1px solid rgba(255,255,255,0.8); animation: slideUp 0.5s ease-out; }
    .card-title { color: #1e293b; font-size: 1.8rem; margin: 0 0 10px 0; }
    
    .btn-save { background: linear-gradient(135deg, #10b981 0%, #059669 100%); color: white; border: none; padding: 15px 40px; border-radius: 12px; font-weight: 600; font-size: 1rem; cursor: pointer; transition: transform 0.2s; box-shadow: 0 4px 10px rgba(16, 185, 129, 0.3); }
    .btn-save:hover { transform: translateY(-2px); }

    @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
</style>
{% endblock %}
